<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protected:Blah</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
            background: url("https://i.imgur.com/9t8sQrX.gif") center / cover no-repeat fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.25);
            font-family: 'Impact', sans-serif;
        }

        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            font-size: 0.9rem;
            color: #888;
        }

        .section-title {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 40px 0 20px;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 35px;
            margin-bottom: 30px;
        }

        .user-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .user-card:hover {
            transform: scale(1.08);
        }

        .avatar-wrap {
            position: relative;
            width: 90px;
            height: 90px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #222;
            object-fit: cover;
            z-index: 2;
            position: relative;
            background: #111;
        }

        .status-dot {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #000;
            z-index: 4;
        }

        .status-online { background: #23a55a; }
        .status-idle { background: #f0b232; }
        .status-dnd { background: #f23f43; }
        .status-offline { background: #80848e; }

        .username {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #aaa;
        }

        .marquee-wrapper {
            width: 100%;
            overflow: hidden;
            position: relative;
            margin-top: 20px;
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }

        .marquee-content {
            display: flex;
            gap: 25px;
            animation: scroll 35s linear infinite;
            width: max-content;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .marquee-content:hover {
            animation-play-state: paused;
        }

        .marquee-content .avatar-wrap {
            width: 55px;
            height: 55px;
        }

        /* Splash Screen - Gaya ng gusto mo */
        #splash {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-family: 'Impact', sans-serif;
            letter-spacing: 2px;
            cursor: pointer;
            gap: 20px;
        }

        #splash .tap-text {
            font-size: 1rem;
            color: #888;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 1px;
        }

        /* Community Hub - Normal na itsura */
        .hub-container {
            margin-top: 20px;
            padding: 15px;
            background: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
        }

        .server-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin: 8px 0;
            background: #1e1e1e;
            border-radius: 4px;
            text-align: left;
            cursor: pointer;
        }

        .server-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid #333;
        }

        .server-details h4 {
            font-size: 0.95rem;
            color: #fff;
            margin-bottom: 2px;
        }

        .server-details p {
            font-size: 0.8rem;
            color: #999;
        }

        /* ✅ POPUP MODAL - TRANSPARENT / BLUR STYLE katulad ng picture */
        #serverModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25); /* Sobrang transparent */
            backdrop-filter: blur(18px); /* Malabo pero makikita pa rin ang likod */
            -webkit-backdrop-filter: blur(18px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
        }

        .modal-content {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.04); /* Sobrang liwanag/transparent */
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            font-family: 'Impact', sans-serif; /* Kapareho ng font mo */
            letter-spacing: 2px;
            color: #fff;
        }

        .modal-content h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .modal-content p {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 25px;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 1px;
        }

        .modal-join {
            display: inline-block;
            padding: 10px 25px;
            background: rgba(45, 125, 70, 0.3);
            border: 1px solid rgba(45, 125, 70, 0.5);
            border-radius: 6px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-family: 'Segoe UI', sans-serif;
            transition: all 0.2s ease;
        }

        .modal-join:hover {
            background: rgba(45, 125, 70, 0.6);
            box-shadow: 0 0 12px rgba(45, 125, 70, 0.3);
        }

        .close-modal {
            margin-top: 20px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Segoe UI', sans-serif;
        }

        .close-modal:hover {
            color: #fff;
        }
    </style>
</head>

    <script>
        // Ayusin sirang larawan
        document.querySelectorAll('img').forEach(img => {
            img.onerror = function() {
                if(this.classList.contains('avatar') || this.classList.contains('server-icon')) {
                    this.src = "https://cdn.discordapp.com/embed/avatars/0.png";
                }
            };
        });

        // Splash screen + Play sound
        const splash = document.getElementById('splash');
        const audio = document.getElementById('bgAudio');
        audio.volume = 0.25;

        splash.addEventListener('click', () => {
            splash.style.display = 'none';
            audio.play().catch(err => console.log("Audio error:", err));
        });

        // Eksaktong script mo lang
        (function() {
            'use strict';
            const allyServers = [
                { name: "BLAH #ALBTHCKS", invite: "Ty7qb4thSs", guildId: "1504217597900755075", icon: "335c5d2498dbf8b0ab834b022710c86a", members: "99999", status: "999999 ONLINE" }
            ];

            const container = document.getElementById('hubContainer');

            allyServers.forEach(server => {
                const iconUrl = `https://cdn.discordapp.com/icons/${server.guildId}/${server.icon}.png?size=128`;
                const card = document.createElement('div');
                card.className = 'server-card';
                card.innerHTML = `
                    <div class="server-info">
                        <img class="server-icon" src="${iconUrl}" alt="${server.name}">
                        <div class="server-details">
                            <h4>${server.name}</h4>
                            <p>${server.members} • ${server.status}</p>
                        </div>
                    </div>
                `;
                // Pag pinindot, lalabas ang transparent modal
                card.onclick = () => openModal(server);
                container.appendChild(card);
            });
        })();

        // Buksan ang modal
        function openModal(server) {
            document.getElementById('modalName').textContent = server.name;
            document.getElementById('modalInfo').textContent = `${server.members} Members • ${server.status}`;
            document.getElementById('modalLink').href = `https://discord.gg/${server.invite}`;
            document.getElementById('serverModal').style.display = 'flex';
        }

        // Isara ang modal
        function closeModal() {
            document.getElementById('serverModal').style.display = 'none';
        }

        // Isara kapag pinindot sa labas ng kahon
        window.onclick = function(e) {
            const modal = document.getElementById('serverModal');
            if (e.target === modal) modal.style.display = 'none';
        }
    </script>
